name: Docker build

on:
  push:
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_ADMIN_USERNAME=ci \
            --build-arg VITE_ADMIN_PASSWORD=ci \
            --build-arg VITE_TRANSLATION_EMAIL= \
            -t portfolio:ci .
